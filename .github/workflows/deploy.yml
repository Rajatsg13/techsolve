name: Build & Deploy to Hostinger

on:
  push:
    branches:
      - main            # Runs every time you push to main
  workflow_dispatch:     # ...and lets you trigger it manually from the Actions tab

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build
        # Generates ./out (static HTML/CSS/JS) and copies public/.htaccess into it.

      # Skipped until the three FTP secrets exist, so runs stay green until then.
      - name: Deploy to Hostinger via FTP
        if: ${{ env.FTP_HOST != '' }}
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./out/          # Upload the static build
          server-dir: /public_html/  # Hostinger web root (change to ./ if your FTP account lands inside public_html)
          dangerous-clean-slate: false  # never delete files not in the build (Search Console, ads.txt, etc.)
